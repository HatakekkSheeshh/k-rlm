services:

  # ── Ollama ──────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: krlm-ollama
    restart: unless-stopped
    ports:
      - "11434:11434" # expose cho host (debug / curl trực tiếp)
    volumes:
      - ollama_data:/root/.ollama # persist downloaded model weights
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Model puller (one-shot init container) ───────────────────────────────────
  ollama-init:
    image: curlimages/curl:latest
    container_name: krlm-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo '>>> Pulling phi3:mini...' &&
        curl -s -X POST http://ollama:11434/api/pull -d '{\"name\":\"phi3:mini\"}' | grep -o '\"status\":\"[^\"]*\"' | tail -1 &&
        echo '>>> Pulling all-minilm...' &&
        curl -s -X POST http://ollama:11434/api/pull -d '{\"name\":\"all-minilm\"}' | grep -o '\"status\":\"[^\"]*\"' | tail -1 &&
        echo '>>> All models pulled successfully.'
      "
    restart: "no"

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: krlm-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_TIMEOUT: "600"
      DEFAULT_MODEL: "phi3:mini"
    env_file:
      - ./backend/.env
    depends_on:
      ollama:
        condition: service_healthy
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - ./backend/app:/app/app
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')" ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    develop:
      watch:
        - action: sync
          path: ./backend/app
          target: /app/app

  # ── Vite frontend (dev) ──────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: krlm-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # anon volume → container node_modules không bị ghi đè
    environment:
      VITE_API_BASE_URL: "http://localhost:8000/api/v1"
    depends_on:
      - backend

  # ── GraphDB (Neo4j) ────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: krlm-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt port
    environment:
      NEO4J_AUTH: "neo4j/password123"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── VectorDB (Qdrant) ────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: krlm-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

# ─── Named volumes ────────────────────────────────────────────────────────────
volumes:
  ollama_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  qdrant_data:
    driver: local
